<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Sistemas de Poleas - Mecánica Aplicada</title>
    <style>
        :root {
            --bg-main: #f4f7fa;
            --panel-bg: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --accent-blue: #0284c7;
            --border-color: #cbd5e1;
            --header-bg: #0f172a;
            --green-success: #10b981;
            --red-danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-dark); display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; font-size: 13px; }

        header {
            background: var(--header-bg); color: white; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid var(--accent-blue);
        }
        header h1 { font-size: 1.3em; }

        .btn-back {
            background: transparent; border: 1px solid var(--border-color); color: white;
            padding: 6px 14px; border-radius: 4px; text-decoration: none; font-weight: bold; transition: all 0.2s;
        }
        .btn-back:hover { background: rgba(255, 255, 255, 0.1); border-color: white; }

        .status-bar {
            background: #1e293b; color: white; padding: 8px 20px;
            display: flex; gap: 25px; font-family: monospace; font-size: 1.1em; border-bottom: 1px solid var(--border-color);
        }
        .status-bar span strong { color: #38bdf8; }

        .main-layout { display: grid; grid-template-columns: 1fr; flex-grow: 1; height: calc(100vh - 85px); }
        @media (min-width: 1024px) { .main-layout { grid-template-columns: 1fr 380px; } }

        .simulation-area { background: #0f172a; padding: 15px; display: flex; flex-direction: column; }
        .canvas-container { position: relative; width: 100%; height: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 6px; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .control-panel { background: var(--panel-bg); border-left: 1px solid var(--border-color); padding: 18px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
        .panel-section { border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; background: #fafafa; }
        .section-title { font-size: 0.95em; font-weight: 700; color: var(--text-dark); margin-bottom: 10px; text-transform: uppercase; border-bottom: 2px solid var(--border-color); padding-bottom: 4px; }
        
        .control-group { margin-bottom: 12px; }
        .control-group label { display: flex; justify-content: space-between; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
        .control-group input[type="range"], select { width: 100%; padding: 5px; accent-color: var(--accent-blue); }

        .action-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; }
        .btn-main { padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-start { background: var(--green-success); color: white; }
        .btn-reset { background: var(--red-danger); color: white; }
    </style>
</head>
<body>

    <header>
        <h1>⚙️ Módulo de Sistemas de Poleas e Inferencia de Ventaja Mecánica</h1>
        <a href="maquinas-simples.html" class="btn-back">🎛️ Volver al Kit</a>
    </header>

    <div class="status-bar">
        <span>Ventaja Mecánica (VM): <strong id="valVM">1.00</strong></span>
        <span>Fuerza Necesaria: <strong id="valFuerza">0.0</strong> N</span>
        <span>Altura Carga: <strong id="valAltura">0.00</strong> m</span>
    </div>

    <div class="main-layout">
        <div class="simulation-area">
            <div class="canvas-container">
                <canvas id="pulleyCanvas"></canvas>
            </div>
        </div>

        <div class="control-panel">
            <div class="panel-section">
                <div class="section-title">Configuración del Polipasto</div>
                <div class="control-group">
                    <label>Tipo de Sistema</label>
                    <select id="selectSistema" onchange="cambiarConfiguracion()">
                        <option value="1">Polea Fija (VM = 1)</option>
                        <option value="2">Polea Móvil (VM = 2)</option>
                        <option value="4">Polipasto Factor 4 (VM = 4)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Masa de la Carga (<span id="txtMasa">5</span> kg)</label>
                    <input type="range" id="inputMasa" min="1" max="20" value="5" oninput="cambiarConfiguracion()">
                </div>
            </div>

            <div class="panel-section">
                <div class="section-title">Cinemática</div>
                <div class="control-group">
                    <label>Desplazamiento del Hilo (<span id="txtCuerda">0.0</span> m)</label>
                    <input type="range" id="inputCuerda" min="0" max="3" step="0.05" value="0" oninput="operarSimulacion()">
                </div>
            </div>

            <div class="action-bar">
                <button class="btn-main btn-start" onclick="alert('Sistema en operación manual mediante slider.')">▶️ Simular</button>
                <button class="btn-main btn-reset" onclick="resetear()">🔄 Reiniciar</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pulleyCanvas');
        const ctx = canvas.getContext('2d');
        const V_WIDTH = 850; const V_HEIGHT = 460;

        let vm = 1; let masa = 5; let desCuerda = 0;

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width; canvas.height = rect.width * (V_HEIGHT / V_WIDTH);
            redibujar();
        }

        function cambiarConfiguracion() {
            vm = parseInt(document.getElementById('selectSistema').value);
            masa = parseFloat(document.getElementById('inputMasa').value);
            document.getElementById('txtMasa').innerText = masa;
            operarSimulacion();
        }

        function operarSimulacion() {
            desCuerda = parseFloat(document.getElementById('inputCuerda').value);
            document.getElementById('txtCuerda').innerText = desCuerda.toFixed(2);

            let fN = (masa * 9.81) / vm;
            let altCarga = desCuerda / vm;

            document.getElementById('valVM').innerText = vm.toFixed(2);
            document.getElementById('valFuerza').innerText = fN.toFixed(1);
            document.getElementById('valAltura').innerText = altCarga.toFixed(2);
            redibujar();
        }

        function redibujar() {
            ctx.save();
            ctx.scale(canvas.width / V_WIDTH, canvas.height / V_HEIGHT);
            ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT);

            // Rejilla
            ctx.strokeStyle = "#2d3748"; ctx.lineWidth = 1;
            for(let i=0; i<V_WIDTH; i+=45) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,V_HEIGHT); ctx.stroke(); }

            // Techo de anclaje
            ctx.fillStyle = "#334155"; ctx.fillRect(200, 40, 450, 10);

            let altCarga = desCuerda / vm;
            let cargaY = 320 - (altCarga * 60);

            // Renderizar Gráfico de Carga Modular
            ctx.fillStyle = "#10b981"; ctx.fillRect(380, cargaY, 50, 50);
            ctx.fillStyle = "#fff"; ctx.font = "bold 11px sans-serif"; ctx.fillText(masa+"kg", 392, cargaY + 30);

            // Esquema Simplificado de Polea Mecánica Educativa
            ctx.strokeStyle = "#cbd5e1"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(405, 100, 25, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = "#475569"; ctx.beginPath(); ctx.arc(405, 100, 6, 0, Math.PI*2); ctx.fill();

            ctx.restore();
        }

        function resetear() {
            document.getElementById('inputCuerda').value = 0;
            cambiarConfiguracion();
        }

        window.addEventListener('resize', resizeCanvas);
        window.onload = () => { cambiarConfiguracion(); resizeCanvas(); };
    </script>
</body>
</html>
