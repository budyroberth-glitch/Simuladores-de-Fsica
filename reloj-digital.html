<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7aa8d1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-in;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .clock-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px 0 rgba(31, 38, 135, 0.5);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .timezone-name {
            color: #ffffff;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .digital-clock {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 255, 0, 0.2);
            border: 2px solid #00ff00;
        }

        .time-display {
            font-size: 2.5em;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            font-weight: bold;
            letter-spacing: 3px;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
        }

        .date-display {
            font-size: 1em;
            color: #00dd00;
            opacity: 0.8;
            font-family: 'Courier New', monospace;
        }

        .city-info {
            color: #e0e0e0;
            font-size: 0.9em;
            margin-top: 15px;
            opacity: 0.8;
            text-align: center;
        }

        .city-name {
            font-weight: bold;
            color: #ffffff;
        }

        .offset {
            font-size: 0.85em;
            color: #b0b0b0;
            margin-top: 5px;
        }

        .format-toggle {
            text-align: center;
            margin-bottom: 30px;
        }

        .format-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
            font-weight: bold;
        }

        .format-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .format-btn.active {
            background: white;
            color: #1e3c72;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
        }

        .add-timezone {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .add-timezone:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .timezone-selector {
            display: none;
            background: rgba(0, 0, 0, 0.8);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .timezone-selector.active {
            display: flex;
        }

        .selector-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .selector-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .selector-content input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            margin-bottom: 15px;
            transition: border-color 0.3s ease;
        }

        .selector-content input:focus {
            outline: none;
            border-color: #667eea;
        }

        .timezone-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .timezone-option {
            padding: 12px;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: background 0.2s ease;
        }

        .timezone-option:hover {
            background: #f0f0f0;
        }

        .selector-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #333;
        }

        .btn-cancel:hover {
            background: #d0d0d0;
        }

        .btn-confirm {
            background: #667eea;
            color: white;
        }

        .btn-confirm:hover {
            background: #5568d3;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .time-display {
                font-size: 2em;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }

            .format-btn {
                margin: 5px;
                padding: 10px 20px;
            }
        }

        .remove-btn {
            background: rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            width: 100%;
        }

        .remove-btn:hover {
            background: rgba(255, 0, 0, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🕐 Digital Clock</h1>
            <p>Current Time in Different Time Zones</p>
        </div>

        <div class="controls">
            <button class="add-timezone" onclick="openTimezoneSelector()">+ Add Time Zone</button>
        </div>

        <div class="format-toggle">
            <button class="format-btn active" onclick="setFormat('24h')">24 Hour</button>
            <button class="format-btn" onclick="setFormat('12h')">12 Hour</button>
        </div>

        <div class="clocks-grid" id="clocksGrid">
            <!-- Clocks will be added here dynamically -->
        </div>
    </div>

    <!-- Timezone Selector Modal -->
    <div class="timezone-selector" id="timezoneSelector">
        <div class="selector-content">
            <h2>Select a Time Zone</h2>
            <input 
                type="text" 
                id="timezoneSearch" 
                placeholder="Search timezone..." 
                onkeyup="filterTimezones()"
            >
            <div class="timezone-list" id="timezoneList">
                <!-- Timezones will be listed here -->
            </div>
            <div class="selector-buttons">
                <button class="btn btn-cancel" onclick="closeTimezoneSelector()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Default timezones
        let activeTimezones = [
            { name: 'New York', timezone: 'America/New_York' },
            { name: 'London', timezone: 'Europe/London' },
            { name: 'Tokyo', timezone: 'Asia/Tokyo' },
            { name: 'Sydney', timezone: 'Australia/Sydney' }
        ];

        let format24h = true;

        // All available timezones
        const allTimezones = [
            // Americas
            { name: 'New York', timezone: 'America/New_York' },
            { name: 'Los Angeles', timezone: 'America/Los_Angeles' },
            { name: 'Chicago', timezone: 'America/Chicago' },
            { name: 'Denver', timezone: 'America/Denver' },
            { name: 'Toronto', timezone: 'America/Toronto' },
            { name: 'Mexico City', timezone: 'America/Mexico_City' },
            { name: 'São Paulo', timezone: 'America/Sao_Paulo' },
            { name: 'Buenos Aires', timezone: 'America/Argentina/Buenos_Aires' },
            
            // Europe
            { name: 'London', timezone: 'Europe/London' },
            { name: 'Paris', timezone: 'Europe/Paris' },
            { name: 'Berlin', timezone: 'Europe/Berlin' },
            { name: 'Madrid', timezone: 'Europe/Madrid' },
            { name: 'Rome', timezone: 'Europe/Rome' },
            { name: 'Amsterdam', timezone: 'Europe/Amsterdam' },
            { name: 'Istanbul', timezone: 'Europe/Istanbul' },
            { name: 'Moscow', timezone: 'Europe/Moscow' },
            
            // Africa
            { name: 'Cairo', timezone: 'Africa/Cairo' },
            { name: 'Johannesburg', timezone: 'Africa/Johannesburg' },
            { name: 'Lagos', timezone: 'Africa/Lagos' },
            { name: 'Nairobi', timezone: 'Africa/Nairobi' },
            
            // Asia
            { name: 'Dubai', timezone: 'Asia/Dubai' },
            { name: 'Mumbai', timezone: 'Asia/Kolkata' },
            { name: 'Bangkok', timezone: 'Asia/Bangkok' },
            { name: 'Hong Kong', timezone: 'Asia/Hong_Kong' },
            { name: 'Singapore', timezone: 'Asia/Singapore' },
            { name: 'Tokyo', timezone: 'Asia/Tokyo' },
            { name: 'Seoul', timezone: 'Asia/Seoul' },
            { name: 'Bangkok', timezone: 'Asia/Bangkok' },
            
            // Oceania
            { name: 'Sydney', timezone: 'Australia/Sydney' },
            { name: 'Melbourne', timezone: 'Australia/Melbourne' },
            { name: 'Auckland', timezone: 'Pacific/Auckland' },
            { name: 'Fiji', timezone: 'Pacific/Fiji' }
        ];

        // Initialize
        function init() {
            renderTimezoneList();
            updateClocks();
            setInterval(updateClocks, 1000);
        }

        function updateClocks() {
            const clocksGrid = document.getElementById('clocksGrid');
            clocksGrid.innerHTML = '';

            activeTimezones.forEach((tz, index) => {
                const clockCard = createClockCard(tz, index);
                clocksGrid.appendChild(clockCard);
            });
        }

        function createClockCard(tzData, index) {
            const card = document.createElement('div');
            card.className = 'clock-card';
            card.style.animationDelay = `${index * 0.1}s`;

            const now = new Date();
            const timeString = new Intl.DateTimeFormat('en-US', {
                timeZone: tzData.timezone,
                hour: format24h ? '2-digit' : '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: !format24h
            }).format(now);

            const dateString = new Intl.DateTimeFormat('en-US', {
                timeZone: tzData.timezone,
                weekday: 'short',
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            }).format(now);

            // Calculate offset
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: tzData.timezone,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });

            const parts = formatter.formatToParts(now);
            const tzTime = new Date(now.toLocaleString('en-US', { timeZone: tzData.timezone }));
            const offset = (tzTime - now) / 60000;
            const hours = Math.floor(offset / 60);
            const minutes = Math.abs(offset % 60);
            const offsetString = `UTC ${hours >= 0 ? '+' : ''}${hours}:${String(minutes).padStart(2, '0')}`;

            card.innerHTML = `
                <div class="timezone-name">${tzData.name}</div>
                <div class="digital-clock">
                    <div class="time-display">${timeString}</div>
                    <div class="date-display">${dateString}</div>
                </div>
                <div class="city-info">
                    <div class="offset">${offsetString}</div>
                    <button class="remove-btn" onclick="removeTimezone(${index})">Remove</button>
                </div>
            `;

            return card;
        }

        function setFormat(fmt) {
            format24h = fmt === '24h';
            
            // Update button styles
            document.querySelectorAll('.format-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            updateClocks();
        }

        function openTimezoneSelector() {
            document.getElementById('timezoneSelector').classList.add('active');
            renderTimezoneList();
        }

        function closeTimezoneSelector() {
            document.getElementById('timezoneSelector').classList.remove('active');
            document.getElementById('timezoneSearch').value = '';
        }

        function renderTimezoneList() {
            const list = document.getElementById('timezoneList');
            list.innerHTML = '';

            allTimezones.forEach(tz => {
                const option = document.createElement('div');
                option.className = 'timezone-option';
                option.innerHTML = `${tz.name} (${tz.timezone})`;
                option.onclick = () => selectTimezone(tz);
                list.appendChild(option);
            });
        }

        function filterTimezones() {
            const searchTerm = document.getElementById('timezoneSearch').value.toLowerCase();
            const list = document.getElementById('timezoneList');
            const options = list.querySelectorAll('.timezone-option');

            options.forEach(option => {
                const text = option.textContent.toLowerCase();
                option.style.display = text.includes(searchTerm) ? 'block' : 'none';
            });
        }

        function selectTimezone(tz) {
            // Check if already exists
            if (!activeTimezones.some(t => t.timezone === tz.timezone)) {
                activeTimezones.push(tz);
                updateClocks();
            }
            closeTimezoneSelector();
        }

        function removeTimezone(index) {
            activeTimezones.splice(index, 1);
            updateClocks();
        }

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
